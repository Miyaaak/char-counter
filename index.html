<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>文字数カウンター</title>
</head>
<body>

  <!-- 最大文字数の入力欄 -->
  <p>
    最大文字数：<input id="max" type="number" placeholder="例：300" style="width:120px;">
  </p>

  <!-- テキスト入力欄 -->
  <textarea id="text" placeholder="ここに入力" style="width:100%; height:300px;"></textarea>

  <!-- 現在の文字数 -->
  <p>文字数：<span id="count">0</span></p>

  <!-- 割合表示 -->
  <p>割合：<span id="percent">0</span>%</p>

  <script>
    const text = document.getElementById('text');
    const count = document.getElementById('count');
    const max = document.getElementById('max');
    const percent = document.getElementById('percent');

    function update() {
      const length = text.value.length;
      count.textContent = length;

      const maxValue = Number(max.value);

      if (maxValue > 0) {
        const ratio = (length / maxValue) * 100;
        percent.textContent = ratio.toFixed(1); // 小数1桁
      } else {
        percent.textContent = 0;
      }
    }

    text.addEventListener('input', update);
    max.addEventListener('input', update);
  </script>

</body>
</html>
